<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial</title>
    <style>
        body {
            background-color: #ffe6e6; /* Fondo rosa pastel */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .tarjeta {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 420px;
            border: 2px solid #ffccd5;
        }
        h1 {
            color: #ff4d6d;
            font-size: 32px;
            margin-bottom: 10px;
        }
        p {
            color: #4a4a4a;
            font-size: 18px;
            line-height: 1.6;
        }
        .corazon {
            color: #ff4d6d;
            font-size: 60px;
            animation: latido 1.2s infinite;
            margin-bottom: 15px;
        }
        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.18); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <div class="corazon">❤️</div>
        <h1>¡Para Wendy!</h1>
        <p>Escribí este código y creé esta página web solo para recordarte lo increíble y especial que eres para mí.</p>
        <p>Gracias por cada momento. Eres mi persona favorita. ✨</p>
    </div>

</body>
</html>
